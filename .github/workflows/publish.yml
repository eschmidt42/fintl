# https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/
name: Publish Python 🐍 distribution 📦 to PyPI and TestPyPI

# only push on tag creation
on:
  push:
    tags:
        - 'v*'

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.10.10"
    - name: Build a binary wheel and a source tarball
      run: uv build --sdist --wheel
    - name: Store the distribution packages
      uses: actions/upload-artifact@v6
      with:
        name: python-package-distributions
        path: dist/

  # publish to test-pypi if pre-release tag
  publish-to-testpypi:

    name: Publish Python 🐍 distribution 📦 to TestPyPI

    needs: [build]

    if: |
      contains(github.ref_name, 'a') ||
      contains(github.ref_name, 'b') ||
      contains(github.ref_name, 'rc') ||
      contains(github.ref_name, '.dev')

    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/fintl

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
      actions: read    # required for actions/download-artifact

    steps:

    - name: Download all the dists
      uses: actions/download-artifact@v7
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish distribution 📦 to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:

    name: Publish Python 🐍 distribution 📦 to PyPI

    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      !contains(github.ref_name, 'a') &&
      !contains(github.ref_name, 'b') &&
      !contains(github.ref_name, 'rc') &&
      !contains(github.ref_name, '.dev')

    needs: [build]

    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/fintl

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
      actions: read    # required for actions/download-artifact

    steps:

    - name: Download all the dists
      uses: actions/download-artifact@v7
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
